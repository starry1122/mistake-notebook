server.port=8080

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/mistake_notebook?useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# OCR settings: use local Tesseract first, fallback to mock on failure
mistake.upload-dir=uploads
mistake.ocr.mode=tesseract
mistake.ocr.tesseract-cmd=D:/Tools/Tesseract-OCR/tesseract.exe
mistake.ocr.lang=chi_sim+eng
